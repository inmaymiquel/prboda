<!doctype html>
<html lang="es" translate="no">
  <head>
    <!-- Configuración básica -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta name="description" content="Invitación de boda" />

    <title>Boda · Inma & Miquel</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Estilos -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- =========================================================
         HERO / PORTADA
         Imagen principal + nombres + fecha + acceso rápido al RSVP
    ========================================================== -->
    <header class="hero" id="top">
      <div class="media">
        <img src="fondo-finca.jpeg" alt="" />
        <div class="overlay"></div>
      </div>

      <div class="content container">
        <div class="hero-top">
          <p class="hero-kicker font-body">¡Nos casamos!</p>

          <h1 class="hero-names" aria-label="Nombres">
            <span class="name font-names">Inma</span>
            <span class="amp font-serif">&</span>
            <span class="name font-names">Miquel</span>
          </h1>
        </div>

        <div class="hero-bottom">
          <div class="hero-divider" aria-hidden="true">
            <span></span>
            <span>✦</span>
            <span></span>
          </div>
          <p class="hero-date font-body">20 JUNIO 2026</p>
        </div>
    </header>

    <!-- JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
